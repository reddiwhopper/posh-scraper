name: Daily Poshmark Scrape

on:
  schedule:
    # 7:00 AM EST = 12:00 PM UTC
    - cron: '0 12 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write   # needed to push the database branch

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can checkout db-storage branch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Write config file
        run: echo "$CONFIG_YAML" > config/config.yaml
        env:
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}

      - name: Restore database
        run: |
          mkdir -p data
          if git ls-remote --exit-code origin db-storage > /dev/null 2>&1; then
            git fetch origin db-storage --depth=1
            git checkout origin/db-storage -- listings.db 2>/dev/null && \
              mv listings.db data/listings.db && \
              echo "Database restored: $(du -h data/listings.db | cut -f1), $(sqlite3 data/listings.db 'SELECT COUNT(*) FROM listings;' 2>/dev/null || echo '?') rows" \
              || echo "listings.db not found on db-storage branch, starting fresh"
          else
            echo "No db-storage branch yet, starting fresh"
          fi

      - name: Run scraper
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py

      - name: Save database
        if: always()
        run: |
          if [ ! -f data/listings.db ]; then
            echo "No database file to save, skipping"
            exit 0
          fi
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          cp data/listings.db listings.db
          git add -f listings.db
          if git diff --staged --quiet; then
            echo "Database unchanged, nothing to commit"
          else
            git commit -m "chore: update database [skip ci]"
            git push origin HEAD:db-storage --force
            echo "Database saved ($(du -h listings.db | cut -f1))"
          fi
